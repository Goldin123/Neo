name: .NET Project Build & Test (No SQL)

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies for all .csproj files
      run: |
        Get-ChildItem -Recurse -Filter *.csproj | ForEach-Object {
          dotnet restore $_.FullName
        }
      shell: pwsh

    - name: Build all .csproj projects (skip .sqlproj)
      run: |
        Get-ChildItem -Recurse -Filter *.csproj | ForEach-Object {
          dotnet build $_.FullName --no-restore
        }
      shell: pwsh

    - name: Run unit tests
      run: dotnet test Neo/Neo.Tests/Neo.Tests.csproj --no-build --verbosity normal
