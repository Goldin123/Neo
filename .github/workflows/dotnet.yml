name: .NET + SQL Database Project Build

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build all .csproj projects (skip .sqlproj)
      run: |
        for /R %%f in (*.csproj) do dotnet build "%%f" --no-restore

    - name: Build SQL Project (.sqlproj) with MSBuild
      run: |
        "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" Neo/Neo.Database/Neo.Database.sqlproj /p:Configuration=Release
